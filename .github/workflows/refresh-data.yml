name: Refresh Champions Data

on:
  schedule:
    # Every Monday at 06:00 UTC — after Raw and weekend PPVs
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install beautifulsoup4==4.12.3 python-dateutil==2.9.0.post0 playwright==1.49.1

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python scrape.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/champions.json
          if git diff --cached --quiet; then
            echo "No changes to champions.json — skipping commit."
          else
            git commit -m "chore: refresh champions data [skip ci]"
            git push
          fi
